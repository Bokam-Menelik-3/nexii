name: nexii
description: A modular Flutter app for productivity, well-being, and financial management.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  provider: ^6.1.1
  google_fonts: ^6.2.0
  cupertino_icons: ^1.0.6
  hive_ce: ^2.2.3
  hive_ce_flutter: ^2.2.3
  http: ^1.2.2
  audioplayers: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/translations/